          example: "ACME Imports Pvt Ltd"
        countryOfOrigin:
          type: "string"
          description: "Two-letter ISO 3166-1 alpha-2; maps to order_details.items[].country_of_origin."
          example: "IN"
        address:
          $ref: "#/components/schemas/PostalAddress"
          description: "Importer address"
