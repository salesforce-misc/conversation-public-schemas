      description: "Body section of the template"
      allOf:
      - $ref: "#/components/schemas/AbstractTemplateSection"
      - type: "object"
        properties:
          parameters:
            minItems: 1
            description: "Ordered list of parameters with their type and value defined"
            type: "array"
            items:
              $ref: "#/components/schemas/AbstractValue"
        required:
        - "parameters"
