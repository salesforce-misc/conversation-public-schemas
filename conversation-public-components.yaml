          options:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/ExperienceTypeOption"
          targetType:
            $ref: "#/components/schemas/ExperienceTypeRef"
          message:
            type: "string"
          targetProperty:
            type: "string"
        required:
        - "targetType"
        - "sourceType"
        - "options"
    CalendarEventOptionsItem:
      description: "A calendar events with time slot options"
      allOf:
