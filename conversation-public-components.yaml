      - "ReviewAndPay"
      - "QuickPay"
      type: "string"
    PaymentError:
      description: "Payment Error Details"
      properties:
        errorCode:
          $ref: "#/components/schemas/PaymentErrorCode"
        errorMessage:
          type: "string"
      required:
      - "errorMessage"
      - "errorCode"
      type: "object"
    PaymentErrorCode:
      description: "Error codes for payment failures"
      enum:
      - "ShippingContactInvalid"
      - "BillingContactInvalid"
      - "AddressUnserviceable"
      - "CouponCodeInvalid"
      - "CouponCodeExpired"
      - "Unknown"
      example: "ShippingContactInvalid"
      type: "string"
    PaymentGatewayTransaction:
      allOf:
      - $ref: "#/components/schemas/AbstractTransaction"
      - properties:
          gateway:
            $ref: "#/components/schemas/PaymentInitiationGateway"
        type: "object"
      description: "A payment transaction as reported by the payment gateway"
    PaymentInitiation:
      description: "Describes HOW to initiate the payment (e.g., UPI intent, Pix copy/QR, hosted payment link, or provider checkout)."
      oneOf:
      - description: "ExternalPaymentApp via UPI (India)"
        properties:
          mode:
            enum:
            - "ExternalPaymentApp"
        required:
        - "upi"
      - description: "ExternalPaymentApp via Pix dynamic code (Brazil)"
        properties:
          mode:
            enum:
            - "ExternalPaymentApp"
        required:
        - "pix"
      - description: "ExternalPaymentApp via Boleto (Brazil)"
        properties:
          mode:
            enum:
            - "ExternalPaymentApp"
        required:
        - "boleto"
      - description: "Hosted payment link"
        properties:
          gateway:
            required:
            - "providerName"
            - "hostedLinkUrl"
          mode:
            enum:
            - "HostedLink"
        required:
        - "gateway"
      - description: "Embedded provider checkout"
        properties:
          gateway:
            required:
            - "providerName"
            - "configurationId"
          mode:
            enum:
            - "GatewayCheckout"
        required:
        - "gateway"
      properties:
        boleto:
          $ref: "#/components/schemas/PaymentInitiationBoleto"
        gateway:
          $ref: "#/components/schemas/PaymentInitiationGateway"
        mode:
          $ref: "#/components/schemas/PaymentInitiationMode"
        pix:
          $ref: "#/components/schemas/PaymentInitiationPix"
        upi:
          $ref: "#/components/schemas/PaymentInitiationUpi"
      required:
      - "mode"
      type: "object"
    PaymentInitiationBoleto:
      additionalProperties: false
      properties:
        digitableLine:
          description: "Boleto 'linha digitável'."
          type: "string"
      required:
      - "digitableLine"
      type: "object"
    PaymentInitiationGateway:
      additionalProperties: false
      description: "Configuration for provider checkout or hosted link."
      properties:
        configurationId:
          description: "Internal config/profile id (for GatewayCheckout)."
          type: "string"
        hostedLinkUrl:
          $ref: "#/components/schemas/Url"
          description: "Provider-hosted payment link (HostedLink)."
        methodHints:
          description: "Optional, provider-agnostic hint to restrict visible methods on the checkout/link."
          items:
            $ref: "#/components/schemas/PaymentMethodHint"
          type: "array"
        paymentConfigurationName:
          description: "WhatsApp PG configuration_name (if using WA payment_gateway)."
          type: "string"
        providerName:
          description: "Payment provider/gateway"
          example: "Razorpay"
          type: "string"
        providerParameters:
          items:
            $ref: "#/components/schemas/NamedValue"
          type: "array"
      type: "object"
    PaymentInitiationMode:
      description: "How the payment is initiated/completed."
      enum:
      - "ExternalPaymentApp"
      - "HostedLink"
      - "GatewayCheckout"
      type: "string"
    PaymentInitiationPix:
      additionalProperties: false
      properties:
        code:
          description: "EMVCo Pix 'Copia e Cola' string."
          type: "string"
        key:
          description: "Pix key value (per keyType)."
          type: "string"
        keyType:
          $ref: "#/components/schemas/PaymentPixKeyType"
      required:
      - "code"
      - "keyType"
      - "key"
      type: "object"
    PaymentInitiationUpi:
      additionalProperties: false
      properties:
        intentLink:
          $ref: "#/components/schemas/Url"
          description: "Full UPI deep link from PG."
          example: "upi://pay?pa=acme@icici&pn=ACME&am=1769.00&cu=INR&tr=ORD-8421"
        merchantCategoryCode:
          type: "string"
        payeeHandle:
          description: "UPI VPA/handle"
          example: "acme@icici"
          type: "string"
      required:
      - "intentLink"
      type: "object"
    PaymentInitiationValue:
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - properties:
          paymentInitiation:
            $ref: "#/components/schemas/PaymentInitiation"
        required:
        - "paymentInitiation"
        type: "object"
      description: "An payment initiation value"
    PaymentItemStatus:
      description: "Status of a payment item"
      enum:
      - "FinalCost"
      - "PendingCost"
      example: "Final"
      type: "string"
    PaymentLineItemType:
      description: "The type of payment line item."
      enum:
      - "PaymentRequestLineItem"
      example: "PaymentRequestLineItem"
      type: "string"
    PaymentLineItemValue:
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - properties:
          lineItem:
            $ref: "#/components/schemas/AbstractPaymentLineItem"
        required:
        - "lineItem"
        type: "object"
      description: "A payment line item value"
    PaymentMethodHint:
      description: "High-level payment method categories supported by provider checkout/link."
      enum:
      - "Card"
      - "Upi"
      - "NetBanking"
      - "Wallet"
      - "Boleto"
      - "Pix"
      - "PayLater"
      - "Emi"
      type: "string"
    PaymentPixKeyType:
      description: "Brazil Pix key type."
      enum:
      - "Cpf"
      - "Cnpj"
      - "Email"
      - "Phone"
      - "Evp"
      type: "string"
    PaymentRequestContactField:
      description: "Allowed contact fields for a payment request."
      enum:
      - "Email"
      - "Name"
      - "Phone"
      - "PostalAddress"
      - "PhoneticName"
      example: "Email"
      type: "string"
    PaymentRequestDetails:
      allOf:
      - $ref: "#/components/schemas/AbstractPaymentRequestDetails"
      - properties:
          allowedUpdateActionTypes:
            description: "The set of allowed update actions by the end user like payment update, shipping contact update, etc."
            items:
              $ref: "#/components/schemas/PaymentUpdateTypes"
            type: "array"
          countryCode:
            description: "Two-letter ISO 3166 country code of Merchant."
            example: "US"
            type: "string"
          currencyCode:
            description: "Three-letter ISO 4217 currency code of payment."
            example: "USD"
            type: "string"
          endpoints:
            $ref: "#/components/schemas/PaymentRequestEndPoints"
          lineItems:
            description: "A set of line items explaining the charges or recurring payments."
            items:
              $ref: "#/components/schemas/AbstractPaymentLineItem"
            minItems: 1
            type: "array"
          merchantCapabilities:
            description: "The list of payment capabilities supported by the merchant."
            items:
              $ref: "#/components/schemas/PaymentRequestMerchantCapability"
            type: "array"
          merchantDomain:
            description: "Domain name associated with the Merchant Account"
            type: "string"
          merchantIdentifier:
            description: "Merchant ID"
            type: "string"
          merchantIdentityCertificate:
            description: "Merchant certificate"
            type: "string"
          merchantIdentityKey:
            description: "Merchant key"
            type: "string"
          merchantName:
            description: "Merchant name"
            type: "string"
          order:
            $ref: "#/components/schemas/OrderContext"
          paymentInitiations:
            description: "One or more ways to initiate payment."
            items:
              $ref: "#/components/schemas/PaymentInitiation"
            type: "array"
          requiredBillingContactFields:
            description: "The list of billing information fields required to process this transaction."
            items:
              $ref: "#/components/schemas/PaymentRequestContactField"
            type: "array"
          requiredShippingContactFields:
            description: "The list of shipping information fields required to fulfill this order."
            items:
              $ref: "#/components/schemas/PaymentRequestContactField"
            type: "array"
          shippingAmount:
            description: "Computed cost for the currently selected shipping method (or flat shipping for the order)."
            format: "currency"
            type: "number"
          shippingMethods:
            description: "The list of available shipping methods."
            items:
              $ref: "#/components/schemas/AbstractShippingMethod"
            type: "array"
          supportedCountries:
            description: "Two-letter ISO 3166 country code of supported countries."
            items:
              type: "string"
            type: "array"
          supportedPaymentNetworks:
            description: "The list of payment networks supported by the merchant."
            items:
              $ref: "#/components/schemas/PaymentRequestSupportedNetwork"
            type: "array"
          totalLineItem:
            $ref: "#/components/schemas/AbstractPaymentLineItem"
            description: "The total of all the line items."
        required:
        - "countryCode"
        - "currencyCode"
        - "lineItems"
        - "totalLineItem"
        type: "object"
      anyOf:
      - required:
        - "merchantName"
        - "merchantDomain"
        - "merchantIdentifier"
        - "merchantIdentityCertificate"
        - "merchantIdentityKey"
        - "merchantCapabilities"
        title: "Apple payments"
      - required:
        - "paymentInitiations"
        - "order"
        title: "Initiation-driven payments"
      description: "Payment Request Details"
    PaymentRequestDetailsType:
      description: "The semantic type of a payment request details."
      enum:
      - "PaymentRequestDetails"
      example: "PaymentRequestDetails"
      type: "string"
    PaymentRequestEndPoints:
      description: "Payment Request EndPoints"
      properties:
        fallbackUrl:
          $ref: "#/components/schemas/Url"
      type: "object"
    PaymentRequestLineItem:
      allOf:
      - $ref: "#/components/schemas/AbstractPaymentLineItem"
      - properties:
          amount:
            description: "The price of the line item."
            format: "currency"
            type: "number"
          automaticReloadPaymentThresholdAmount:
            description: "The balance on an account, before the merchant applies automatic reload amount."
            format: "currency"
            type: "number"
          commerce:
            $ref: "#/components/schemas/OrderItemCommerceAttributes"
            description: "Catalog & compliance metadata."
          discount:
            $ref: "#/components/schemas/Discount"
            description: "Optional per-line discount object. Use when a discount program/name must be preserved."
          image:
            $ref: "#/components/schemas/ImageAsset"
          label:
            description: "A short description of the line item."
            type: "string"
          quantity:
            default: 1
            description: "Quantity of this item; 'amount' is unit price when quantity > 1."
            minimum: 1
            type: "integer"
          saleAmount:
            description: "Optional discounted price of the line item. Must be < amount."
            format: "currency"
            type: "number"
          status:
            $ref: "#/components/schemas/PaymentItemStatus"
          timing:
            $ref: "#/components/schemas/AbstractTiming"
        required:
        - "label"
        - "amount"
        type: "object"
      description: "Payment Request Line Item"
    PaymentRequestMerchantCapability:
      description: "Merchant capabilities for a payment request."
      enum:
      - "Supports3DS"
      - "SupportsEMV"
      - "SupportsCredit"
      - "SupportsDebit"
      example: "SupportsCredit"
      type: "string"
    PaymentRequestMessage:
      allOf:
      - $ref: "#/components/schemas/AbstractMessage"
      - properties:
          paymentRequest:
            $ref: "#/components/schemas/AbstractPaymentRequest"
        required:
        - "paymentRequest"
        type: "object"
      description: "Payment Request message"
    PaymentRequestMessageDefinition:
      allOf:
      - $ref: "#/components/schemas/AbstractPaymentRequest"
      - properties:
          messageDefinitionNameOrId:
            $ref: "#/components/schemas/MessageDefinitionNameOrId"
          parameters:
            items:
              $ref: "#/components/schemas/NamedValue"
            type: "array"
          targetLocale:
            $ref: "#/components/schemas/Locale"
            description: "The requested locale the message should be translated into"
            example: "en-US"
        required:
        - "messageDefinitionNameOrId"
        type: "object"
      description: "References to a layout of payment request"
    PaymentRequestPayment:
      allOf:
      - $ref: "#/components/schemas/AbstractPaymentRequest"
      - properties:
          footer:
            $ref: "#/components/schemas/AbstractTitleItem"
          header:
            $ref: "#/components/schemas/AbstractTitleItem"
          images:
            items:
              $ref: "#/components/schemas/ImageAsset"
            type: "array"
          message:
            $ref: "#/components/schemas/AbstractTitleItem"
          payment:
            $ref: "#/components/schemas/AbstractPaymentRequestDetails"
          reply:
            $ref: "#/components/schemas/AbstractTitleItem"
        required:
        - "payment"
        type: "object"
      description: "Payment request"
    PaymentRequestShippingMethod:
      allOf:
      - $ref: "#/components/schemas/AbstractShippingMethod"
      - properties:
          amount:
            description: "The cost associated with this shipping method."
            format: "currency"
            type: "number"
          detail:
            description: "Additional description"
            type: "string"
          identifier:
            description: "The value defined by the client used to identify the shipping method."
            type: "string"
          label:
            description: "A short description of the shipping method."
            type: "string"
        required:
        - "amount"
        - "detail"
        - "identifier"
        - "label"
        type: "object"
      description: "Payment Request Shipping Method"
    PaymentRequestSupportedNetwork:
      description: "Supported networks for a payment request."
      enum:
      - "AmericanExpress"
      - "Discover"
      - "Jcb"
      - "MasterCard"
      - "PrivateLabel"
      - "Visa"
      - "CartesBancaires"
      - "ChinaUnionPay"
      - "Eftpos"
      - "Electron"
      - "Elo"
      - "Girocard"
      - "Interac"
      - "Mada"
      - "Maestro"
      - "Mir"
      - "VPay"
      example: "AmericanExpress"
      type: "string"
    PaymentResponseMessage:
      allOf:
      - $ref: "#/components/schemas/AbstractMessage"
      - properties:
          paymentResponse:
            $ref: "#/components/schemas/AbstractPaymentResponse"
          referenceId:
            $ref: "#/components/schemas/UniqueId"
            description: "Used to correlate the payment status with the actual payment message"
        required:
        - "paymentResponse"
        type: "object"
      description: "Payment Response message"
    PaymentResult:
      allOf:
      - $ref: "#/components/schemas/AbstractPaymentResponse"
      - properties:
          errors:
            items:
              $ref: "#/components/schemas/PaymentError"
            type: "array"
          paymentStatus:
            $ref: "#/components/schemas/PaymentStatus"
        required:
        - "paymentStatus"
        type: "object"
      description: "Payment Result"
    PaymentStatus:
      description: "Payment status"
      enum:
      - "Success"
      - "Error"
      - "Pending"
      - "Other"
      example: "Success"
      type: "string"
    PaymentStatusMessage:
      allOf:
      - $ref: "#/components/schemas/AbstractMessage"
      - properties:
          paymentStatusResponse:
            $ref: "#/components/schemas/AbstractPaymentStatusResponse"
        required:
        - "paymentStatusResponse"
        type: "object"
      description: "Contains payload for payment status"
    PaymentStatusResponse:
      allOf:
      - $ref: "#/components/schemas/AbstractPaymentStatusResponse"
      - properties:
          currencyAmount:
            $ref: "#/components/schemas/CurrencyAmount"
          referenceId:
            description: "id used to correlate the message"
            type: "string"
          status:
            $ref: "#/components/schemas/PaymentStatus"
            description: "Status of the payment for the order."
          transactions:
            description: "List of transactions for this payment"
            items:
              $ref: "#/components/schemas/AbstractTransaction"
            minItems: 1
            type: "array"
        required:
        - "referenceId"
        - "status"
        - "currencyAmount"
        - "transactions"
        type: "object"
      description: "Represents the status payload for a payment order. See https://developers.facebook.com/docs/whatsapp/cloud-api/payments-api/payments-in/pg#step-3 for Payment Gateways-WhatsApp"
    PaymentStatusTransactionType:
      description: "Type of payment transaction"
      enum:
      - "PaymentGatewayTransaction"
      type: "string"
    PaymentUpdateTypes:
      description: "Allowed update actions"
      enum:
      - "PaymentMethodUpdate"
      - "ShippingContactUpdate"
      - "ShippingMethodUpdate"
      example: "PaymentMethodUpdate"
      type: "string"
    PendingAttachmentUploadResult:
      allOf:
      - $ref: "#/components/schemas/AbstractAttachmentUploadResult"
      - properties:
          referenceId:
            $ref: "#/components/schemas/UniqueId"
        required:
        - "referenceId"
        type: "object"
      description: "Attachment upload that is pending and will be handled async"
    PhoneCallAction:
      allOf:
      - $ref: "#/components/schemas/AbstractAction"
      - properties:
          phoneNumber:
            type: "string"
        required:
        - "phoneNumber"
        type: "object"
      description: "An action to make a phone call"
    PostalAddress:
      description: "Object representing a mailing address"
      properties:
        addressLines:
          description: "Street, unit, etc"
          items:
            type: "string"
          type: "array"
        administrativeArea:
          description: "State or Region"
          type: "string"
        country:
          description: "Country"
          type: "string"
        countryCode:
          description: "Two-letter ISO 3166 country code"
          example: "US"
          type: "string"
        locality:
          description: "City"
          type: "string"
        postalCode:
          type: "string"
        subAdministrativeArea:
          description: "County or other region"
          type: "string"
        subLocality:
          description: "Information associated with an address, defined at the city level"
          type: "string"
      required:
      - "addressLines"
      - "locality"
      - "country"
      - "postalCode"
      type: "object"
    ProductInformationRequestItem:
      allOf:
      - $ref: "#/components/schemas/AbstractInformationRequestItem"
      - properties:
          catalogId:
            minLength: 1
            type: "string"
          message:
            minLength: 1
            type: "string"
          productId:
            minLength: 1
            type: "string"
        required:
        - "catalogId"
        - "productId"
        - "message"
        type: "object"
      description: "Product information request"
    ProductSet:
      description: "A set of product(s) grouped into sections for multi-product messages"
      oneOf:
      - required:
        - "productId"
        title: "Single-product message"
      - required:
        - "sections"
        title: "Multi-product message"
      properties:
        productId:
          description: "Product ID for single product messages"
          type: "string"
        sections:
          items:
            $ref: "#/components/schemas/CatalogSection"
          minItems: 1
          type: "array"
      type: "object"
    PromotionalOfferTemplateSection:
      allOf:
      - $ref: "#/components/schemas/AbstractTemplateSection"
      - properties:
          parameters:
            items:
              $ref: "#/components/schemas/AbstractValue"
              description: "List of one parameter with their type and value defined"
            minItems: 1
            type: "array"
        required:
        - "parameters"
        type: "object"
      description: "Promo Code section of the template"
    QueueRoutingConfigDetails:
      allOf:
      - $ref: "#/components/schemas/RoutingConfigurationDetails"
      - properties:
          queueId:
            type: "string"
        type: "object"
      description: "Queue routing based configuration details."
    Recipient:
      description: "A Recipient"
      properties:
        contact:
          type: "string"
        displayName:
          type: "string"
        identifier:
          type: "string"
      required:
      - "identifier"
      type: "object"
    Recipients:
      description: "Recipients of a conversation entry"
      properties:
        hidden:
          items:
            $ref: "#/components/schemas/Recipient"
          type: "array"
        primary:
          items:
            $ref: "#/components/schemas/Recipient"
          type: "array"
        secondary:
          items:
            $ref: "#/components/schemas/Recipient"
          type: "array"
      type: "object"
    RecordId:
      description: "An id of an application record"
      type: "string"
    RecordReference:
      additionalProperties: false
      description: "A reference to a record."
      properties:
        id:
          $ref: "#/components/schemas/UniqueId"
        recordId:
          $ref: "#/components/schemas/RecordId"
      required:
      - "id"
      - "recordId"
      type: "object"
    RecordResult:
      properties:
        isCreated:
          type: "boolean"
        recordReferenceId:
          $ref: "#/components/schemas/UniqueId"
        resultMessage:
          type: "string"
      required:
      - "recordReferenceId"
      - "isCreated"
      type: "object"
    RecurringTiming:
      allOf:
      - $ref: "#/components/schemas/AbstractTiming"
      - properties:
          endDate:
            format: "date"
            type: "string"
          intervalCount:
            type: "integer"
          intervalUnit:
            $ref: "#/components/schemas/TimingIntervalUnit"
          startDate:
            format: "date"
            type: "string"
        required:
        - "startDate"
        - "intervalUnit"
        - "intervalCount"
        type: "object"
      description: "Recurring Timing"
    ReferenceValue:
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - properties:
          referenceId:
            $ref: "#/components/schemas/UniqueId"
        required:
        - "referenceId"
        type: "object"
      description: "A reference value"
    Refund:
      description: "Represents a refund for the order."
      properties:
        createdTimestamp:
          description: "Epoch time in milliseconds"
          format: "int64"
          type: "integer"
        currencyAmount:
          $ref: "#/components/schemas/CurrencyAmount"
        id:
          description: "Alpha-numeric ID of the refund."
          type: "string"
        speedProcessedRaw:
          description: "Speed by which refund was processed."
          example: "instant"
          type: "string"
        statusRaw:
          description: "Status of the refund."
          example: "success"
          type: "string"
        updatedTimestamp:
          description: "Epoch time in milliseconds"
          format: "int64"
          type: "integer"
      required:
      - "id"
      - "currencyAmount"
      - "speedProcessedRaw"
      - "statusRaw"
      - "createdTimestamp"
      type: "object"
    ResultError:
      properties:
        errorCode:
          description: "A Salesforce API Error code. Can be used for displaying a localized error in UI"
          type: "string"
        errorMessage:
          description: "A non localized message. Do not use for display in UI."
          type: "string"
        errorType:
          $ref: "#/components/schemas/ResultErrorType"
          description: "The type of error. To be used for displaying a localized error message in UI"
      required:
      - "errorType"
      - "errorMessage"
      type: "object"
    ResultErrorType:
      enum:
      - "InvalidResponse"
      - "CatalogMessageExpired"
      - "HandlerTimedOut"
      - "InternalServerError"
      type: "string"
    ResultReference:
      additionalProperties: false
      description: "A reference to a result."
      properties:
        referenceId:
          $ref: "#/components/schemas/UniqueId"
      required:
      - "referenceId"
      type: "object"
    RoutingConfigurationDetails:
      description: "Definition of Routing Configuration Details including routing configuration type and other routing details associated with the routing configuration type."
      discriminator:
        mapping:
          AgentRoutingType: "#/components/schemas/AgentRoutingConfigDetails"
          QueueRoutingType: "#/components/schemas/QueueRoutingConfigDetails"
        propertyName: "routingConfigurationType"
      properties:
        routingConfigurationType:
          $ref: "#/components/schemas/RoutingConfigurationType"
      type: "object"
    RoutingConfigurationType:
      description: "Enum for Routing Configuration Type"
      enum:
      - "QueueRoutingType"
      - "AgentRoutingType"
      type: "string"
    RoutingContext:
      description: "Internal context about the routing request (channelData field on Omni events should be deserialized against this)"
      properties:
        conversationId:
          description: "The conversation associated with the work being routed by Omni"
          type: "string"
        eventId:
          description: "The UUID of the originating ConversationRoutingRequestedEvent event"
          type: "string"
        routerParticipantSubject:
          description: "The router participant tied to routing"
          type: "string"
        routingType:
          $ref: "#/components/schemas/RoutingType"
          type: "string"
      required:
      - "eventId"
      - "conversationId"
      - "routingType"
      type: "object"
    RoutingFailureType:
      description: "How routing failed or succeeded"
      enum:
      - "None"
      - "Unknown"
      - "SubmissionError"
      - "RoutingError"
      - "Cancelled"
      type: "string"
    RoutingResult:
      allOf:
      - $ref: "#/components/schemas/AbstractEntry"
      - properties:
          cancelReason:
            $ref: "#/components/schemas/CancelReason"
            description: "Reason for cancelling the conference routing"
          errorMessages:
            description: "Any messages that occurred during routing - can be errors from before/after omni or status messages depending on the failureType"
            items:
              type: "string"
            type: "array"
          estimatedWaitTime:
            $ref: "#/components/schemas/EstimatedWaitTime"
            description: "Estimated Wait Time value and whether this Estimated Wait Time is requested"
          failureReason:
            description: "Indicates the specific reason for the failure"
            type: "string"
          failureType:
            $ref: "#/components/schemas/RoutingFailureType"
            description: "Indicates what type of failure occurred"
          initiator:
            $ref: "#/components/schemas/Participant"
            description: "The participant who initiated the routing"
          isExternallyRouted:
            description: "Indicates whether routing is initiated from an external partner system or not"
            type: "boolean"
          pendingServiceRoutingId:
            description: "PSR ID from omni event - if successful"
            type: "string"
          recordId:
            description: "Routed record ID from omni event - if successful"
            type: "string"
          routingConfigurationDetails:
            $ref: "#/components/schemas/RoutingConfigurationDetails"
            description: "Routing Configuration Detail, including routing method and details associated with the routing method."
          routingType:
            $ref: "#/components/schemas/RoutingType"
            description: "Routing Type"
          skipRouterCPRemovalIfNoRoutingFailures:
            description: "Indicates whether the router CP removal should be skipped if there are no routing failures"
            type: "boolean"
          workOwnerId:
            description: "The SFDC Id of user who is requesting cancellation"
            type: "string"
        required:
        - "routingType"
        - "failureType"
        - "errorMessages"
        type: "object"
      description: "Result of conversation routing if either successful or failure"
