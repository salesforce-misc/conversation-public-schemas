            $ref: "#/components/schemas/UniqueId"
          imageId:
            $ref: "#/components/schemas/UniqueId"
        required:
        - "videoId"
    OAuthTokenRequestType:
      description: "Type of OAuth Token Request"
      type: "string"
      enum:
      - "OAuthDelegatedClientSecretTokenRequest"
      example: "OAuthDelegatedClientSecretTokenRequest"
    RecurringTiming:
      description: "Recurring Timing"
      allOf:
      - $ref: "#/components/schemas/AbstractTiming"
      - type: "object"
        properties:
          endDate:
            type: "string"
            format: "date"
          startDate:
            type: "string"
            format: "date"
