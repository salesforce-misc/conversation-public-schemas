      description: "A value that can be either static primitive or a dynamic reference. Exactly one of the value fields must be set."
      oneOf:
      - required:
        - "stringValue"
      - required:
        - "booleanValue"
      - required:
        - "numberValue"
      - required:
        - "reference"
      type: "object"
      properties:
        reference:
          $ref: "#/components/schemas/DynamicReference"
          description: "Dynamic reference to a screen field value"
        stringValue:
          type: "string"
          description: "Static string value"
        booleanValue:
          type: "boolean"
          description: "Static boolean value"
        numberValue:
          type: "number"
          description: "Static number value"
