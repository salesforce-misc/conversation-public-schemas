      description: "A value that presents an Experience Type value as an option"
      type: "object"
      properties:
        value:
          description: "A value - this can be Any type as per OAS https://swagger.io/docs/specification/data-models/data-types/#any"
          example: "a free form string or an object or an array"
        optionIdentifier:
          $ref: "#/components/schemas/UniqueIdentifier"
      required:
      - "optionIdentifier"
      - "value"
    ReferenceValue:
      description: "A reference value"
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - type: "object"
        properties:
          referenceId:
            $ref: "#/components/schemas/UniqueId"
        required:
        - "referenceId"
    StaticContentButtons:
      description: "Text with buttons"
      allOf:
      - $ref: "#/components/schemas/AbstractStaticContent"
      - type: "object"
        properties:
          actions:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/AbstractAction"
          text:
            $ref: "#/components/schemas/Text"
          linkItems:
            minItems: 1
