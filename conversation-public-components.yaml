      description: "Collection of inline metadata for a cited reference."
      allOf:
      - $ref: "#/components/schemas/AbstractCitedDetails"
      - type: "object"
        properties:
          inlineMetadata:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/CitedInlineMetadata"
        required:
        - "inlineMetadata"
