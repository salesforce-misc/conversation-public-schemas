    SelectedOptionsInputValue:
      description: "The select options of a select/picker input"
      allOf:
      - $ref: "#/components/schemas/AbstractInputValue"
      - type: "object"
        properties:
          selectedOptions:
            type: "array"
            items:
              $ref: "#/components/schemas/SelectedOption"
        required:
        - "selectedOptions"
