      description: "Conditional element that renders content based on a condition"
      allOf:
      - $ref: "#/components/schemas/AbstractElement"
      - type: "object"
        properties:
          condition:
            $ref: "#/components/schemas/AbstractConditionExpression"
          else:
            type: "array"
            items:
              $ref: "#/components/schemas/SectionElement"
