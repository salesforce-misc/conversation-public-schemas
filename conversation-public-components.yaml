      type: "string"
      description: "How the payment is initiated/completed."
      enum:
      - "ExternalPaymentApp"
      - "HostedLink"
      - "GatewayCheckout"
    AbstractSection:
      description: "Common attributes for all section(screen) types. This can include input and non input fields."
      type: "object"
