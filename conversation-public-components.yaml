asyncapi: "1.0.0"
info:
  title: "Conversation Entry Payload Schema"
  version: "0.0.1"
  description: "Conversation Entry Payload Schema for Salesforce Enhanced Channels"
components:
  schemas:
    OrderExpiration:
      description: "Optional order expiration used by chat payment surfaces."
      type: "object"
      properties:
        description:
          type: "string"
          description: "Reason shown when the order expires."
          maxLength: 120
        timestamp:
          format: "int64"
          description: "UTC Unix timestamp in seconds when the order should expire (min now+300s)."
          type: "integer"
          example: 1759400000
      required:
      - "timestamp"
    TextDecoration:
      type: "string"
      description: "Text decoration for text components."
      enum:
      - "Underline"
      - "Strikethrough"
    PaymentRequestShippingMethod:
      description: "Payment Request Shipping Method"
      allOf:
      - $ref: "#/components/schemas/AbstractShippingMethod"
      - type: "object"
        properties:
          identifier:
            type: "string"
            description: "The value defined by the client used to identify the shipping method."
          amount:
            type: "number"
            format: "currency"
            description: "The cost associated with this shipping method."
          detail:
            type: "string"
            description: "Additional description"
          label:
            type: "string"
            description: "A short description of the shipping method."
        required:
        - "amount"
        - "detail"
        - "identifier"
        - "label"
    CopyCodeAction:
      description: "An action to copy a code"
      allOf:
      - $ref: "#/components/schemas/AbstractAction"
      - type: "object"
        properties:
          code:
            type: "string"
        required:
        - "code"
    DocumentAsset:
      description: "A document asset of a message."
      allOf:
      - $ref: "#/components/schemas/AbstractAsset"
    AbstractInputSection:
      description: "Common attributes for all input section types"
      type: "object"
      properties:
        sectionType:
          $ref: "#/components/schemas/InputSectionType"
      required:
      - "sectionType"
      discriminator:
        propertyName: "sectionType"
    CitationClaim:
      description: "Citation claim."
      type: "object"
      properties:
        claimStartOffset:
          type: "integer"
          description: "Offset position in the message where the citation claim starts."
        claimEndOffset:
          type: "integer"
          description: "Offset position in the message where the citation claim ends."
      required:
      - "claimStartOffset"
      - "claimEndOffset"
    OrderStatusUpdate:
      description: "Order status information"
      type: "object"
      properties:
        description:
          type: "string"
          description: "Description of the order status"
          example: "Order has been shipped"
        referenceId:
          type: "string"
          description: "Reference ID of the order"
          example: "ORD-12345"
        status:
          $ref: "#/components/schemas/OrderStatus"
      required:
      - "referenceId"
      - "status"
    FormListPicker:
      description: "Form as a list picker"
      allOf:
      - $ref: "#/components/schemas/AbstractForm"
      - type: "object"
        properties:
          images:
            type: "array"
            items:
              $ref: "#/components/schemas/ImageAsset"
          message:
            $ref: "#/components/schemas/AbstractTitleItem"
          reply:
            $ref: "#/components/schemas/AbstractTitleItem"
          sections:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/TitleOptionItemSection"
        required:
        - "sections"
    StaticContentRichLink:
      description: "Static content as a rich link"
      allOf:
      - $ref: "#/components/schemas/AbstractStaticContent"
      - type: "object"
        properties:
          image:
            $ref: "#/components/schemas/ImageAsset"
          text:
            $ref: "#/components/schemas/Text"
          video:
            $ref: "#/components/schemas/VideoAsset"
          linkItem:
            $ref: "#/components/schemas/TitleLinkItem"
        required:
        - "linkItem"
    RoutingWorkType:
      type: "string"
      description: "work event type"
      enum:
      - "Assigned"
      - "Accepted"
      - "Cancelled"
      - "Closed"
      - "Declined"
      - "TransferError"
      - "Transferred"
    FormResponseInputs:
      description: "The input response values to a Form Message"
      allOf:
      - $ref: "#/components/schemas/AbstractFormResponse"
      - type: "object"
        properties:
          formTitle:
            $ref: "#/components/schemas/AbstractTitleItem"
          inputValues:
            type: "array"
            items:
              $ref: "#/components/schemas/AbstractInputValue"
        required:
        - "inputValues"
    TextInput:
      description: "A text input"
      allOf:
      - $ref: "#/components/schemas/AbstractInput"
      - type: "object"
        properties:
          regEx:
            type: "string"
          prefixText:
            type: "string"
          maximumCharacterCount:
            type: "integer"
          keyboardType:
            $ref: "#/components/schemas/TextInputKeyboardType"
          textInputType:
            $ref: "#/components/schemas/TextInputType"
          textContentType:
            $ref: "#/components/schemas/TextInputContentType"
          placeholder:
            type: "string"
    ChoicesListPicker:
      description: "Choices as a list picker"
      allOf:
      - $ref: "#/components/schemas/AbstractChoices"
      - type: "object"
        properties:
          images:
            type: "array"
            items:
              $ref: "#/components/schemas/ImageAsset"
          title:
            type: "string"
          message:
            $ref: "#/components/schemas/AbstractTitleItem"
          reply:
            $ref: "#/components/schemas/AbstractTitleItem"
          optionItems:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/TitleOptionItem"
        required:
        - "title"
        - "optionItems"
    UrlValue:
      description: "A url value"
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - type: "object"
        properties:
          urlValue:
            $ref: "#/components/schemas/Url"
        required:
        - "urlValue"
    InputValueType:
      type: "string"
      enum:
      - "SingleInputValue"
      - "SelectedOptionsInputValue"
    ExternalApplication:
      description: "A link to an external application e.g imessage app."
      allOf:
      - $ref: "#/components/schemas/AbstractApplication"
      - type: "object"
        properties:
          images:
            type: "array"
            items:
              $ref: "#/components/schemas/ImageAsset"
          iconImageId:
            $ref: "#/components/schemas/UniqueId"
          message:
            $ref: "#/components/schemas/AbstractTitleItem"
          reply:
            $ref: "#/components/schemas/AbstractTitleItem"
          bundle:
            type: "string"
            description: "Apple imessage bundle id"
          useLiveLayout:
            type: "boolean"
            description: "Apple imessage live layout"
    AbstractExperienceTypeInput:
      description: "Base type for all Experience Type inputs"
      type: "object"
      properties:
        inputIdentifier:
          $ref: "#/components/schemas/UniqueIdentifier"
        inputType:
          $ref: "#/components/schemas/ExperienceTypeInputType"
      required:
      - "inputType"
      - "inputIdentifier"
      discriminator:
        propertyName: "inputType"
    AbstractMessage:
      description: "Base definition for all message types"
      type: "object"
      properties:
        inReplyToMessageId:
          $ref: "#/components/schemas/InReplyToMessageId"
        customHandlingType:
          $ref: "#/components/schemas/CustomHandlingType"
        id:
          $ref: "#/components/schemas/MessageId"
        messageType:
          $ref: "#/components/schemas/MessageType"
        references:
          type: "array"
          items:
            $ref: "#/components/schemas/RecordReference"
        contentCategory:
          $ref: "#/components/schemas/MessageContentCategory"
          description: "The category of the message"
          example: "PromotionalOutreach"
      required:
      - "id"
      - "messageType"
      discriminator:
        propertyName: "messageType"
        mapping:
          ChoicesResponseMessage: "#/components/schemas/ChoicesResponseMessage"
          StaticContentMessage: "#/components/schemas/StaticContentMessage"
          AuthenticationResponseMessage: "#/components/schemas/AuthenticationResponseMessage"
          FormResponseMessage: "#/components/schemas/FormResponseMessage"
          PaymentResponseMessage: "#/components/schemas/PaymentResponseMessage"
          AuthenticationRequestMessage: "#/components/schemas/AuthenticationRequestMessage"
          FormMessage: "#/components/schemas/FormMessage"
          ChoicesMessage: "#/components/schemas/ChoicesMessage"
          PaymentRequestMessage: "#/components/schemas/PaymentRequestMessage"
          CommandMessage: "#/components/schemas/CommandMessage"
    PaymentInitiation:
      description: "Describes HOW to initiate the payment (e.g., UPI intent, Pix copy/QR, hosted payment link, or provider checkout)."
      oneOf:
      - description: "ExternalPaymentApp via UPI (India)"
        properties:
          mode:
            enum:
            - "ExternalPaymentApp"
        required:
        - "upi"
      - description: "ExternalPaymentApp via Pix dynamic code (Brazil)"
        properties:
          mode:
            enum:
            - "ExternalPaymentApp"
        required:
        - "pix"
      - description: "ExternalPaymentApp via Boleto (Brazil)"
        properties:
          mode:
            enum:
            - "ExternalPaymentApp"
        required:
        - "boleto"
      - description: "Hosted payment link"
        properties:
          mode:
            enum:
            - "HostedLink"
          gateway:
            required:
            - "providerName"
            - "hostedLinkUrl"
        required:
        - "gateway"
      - description: "Embedded provider checkout"
        properties:
          mode:
            enum:
            - "GatewayCheckout"
          gateway:
            required:
            - "providerName"
            - "configurationId"
        required:
        - "gateway"
      type: "object"
      properties:
        mode:
          $ref: "#/components/schemas/PaymentInitiationMode"
        boleto:
          $ref: "#/components/schemas/PaymentInitiationBoleto"
        pix:
          $ref: "#/components/schemas/PaymentInitiationPix"
        gateway:
          $ref: "#/components/schemas/PaymentInitiationGateway"
        upi:
          $ref: "#/components/schemas/PaymentInitiationUpi"
      required:
      - "mode"
    ExperienceTypeChoicesResponseSelection:
      description: "The selections to a choices message as Experience Type values"
      allOf:
      - $ref: "#/components/schemas/AbstractExperienceTypeChoicesResponse"
      - type: "object"
        properties:
          selectedValues:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/ExperienceTypeValue"
        required:
        - "selectedValues"
    FormResponseExperienceType:
      description: "The result of handling a form response"
      allOf:
      - $ref: "#/components/schemas/AbstractFormResponse"
      - type: "object"
        properties:
          experienceTypeResponse:
            $ref: "#/components/schemas/AbstractExperienceTypeFormResponse"
        required:
        - "experienceTypeResponse"
    TextType:
      type: "string"
      description: "The semantic type of the text, which influences its visual presentation."
      enum:
      - "Heading"
      - "Subheading"
      - "Body"
      - "Caption"
    AuthenticationStatus:
      description: "Authentication status in the Authentication response."
      type: "string"
      enum:
      - "Authenticated"
      - "Error"
      example: "Authenticated"
    PostalAddress:
      description: "Object representing a mailing address"
      type: "object"
      properties:
        country:
          type: "string"
          description: "Country"
        subLocality:
          type: "string"
          description: "Information associated with an address, defined at the city level"
        countryCode:
          type: "string"
          description: "Two-letter ISO 3166 country code"
          example: "US"
        postalCode:
          type: "string"
        locality:
          type: "string"
          description: "City"
        subAdministrativeArea:
          type: "string"
          description: "County or other region"
        addressLines:
          type: "array"
          description: "Street, unit, etc"
          items:
            type: "string"
        administrativeArea:
          type: "string"
          description: "State or Region"
      required:
      - "addressLines"
      - "locality"
      - "country"
      - "postalCode"
    SectionType:
      type: "string"
      enum:
      - "SingleInputFlowSection"
      - "MultiInputFlowSection"
    Participant:
      description: "A Participant"
      type: "object"
      properties:
        role:
          $ref: "#/components/schemas/ParticipantRole"
          description: "The role of this participant"
        appType:
          $ref: "#/components/schemas/AppType"
        subject:
          type: "string"
          description: "Subject identifier for this participant"
          example: "005x00000000001"
        clientIdentifier:
          type: "string"
          description: "The clientIdentifier for this participant"
      required:
      - "appType"
      - "subject"
      - "role"
    OrderBeneficiary:
      description: "Recipient for shipped physical goods (used by WhatsApp order_details compliance)."
      type: "object"
      properties:
        name:
          type: "string"
          description: "Full name of the recipient."
        phone:
          type: "string"
          description: "Optional contact phone in E.164 format."
        address:
          $ref: "#/components/schemas/PostalAddress"
      required:
      - "name"
      - "address"
    PaymentInitiationValue:
      description: "An payment initiation value"
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - type: "object"
        properties:
          paymentInitiation:
            $ref: "#/components/schemas/PaymentInitiation"
        required:
        - "paymentInitiation"
    Note:
      description: "A note entry (for private whisper messages)"
      allOf:
      - $ref: "#/components/schemas/AbstractEntry"
      - type: "object"
        properties:
          abstractMessage:
            $ref: "#/components/schemas/AbstractMessage"
        required:
        - "abstractMessage"
    SwitchElement:
      description: "Multi-case conditional element that renders content based on a value"
      allOf:
      - $ref: "#/components/schemas/AbstractElement"
      - type: "object"
        properties:
          valueReference:
            $ref: "#/components/schemas/DynamicReference"
          default:
            type: "array"
            items:
              $ref: "#/components/schemas/SectionElement"
          cases:
            minItems: 1
            description: "List of switch cases with their components"
            type: "array"
            items:
              $ref: "#/components/schemas/SwitchCase"
        required:
        - "valueReference"
        - "cases"
    TitleImageItem:
      allOf:
      - $ref: "#/components/schemas/AbstractTitleItem"
      - type: "object"
        properties:
          imageSubTitle:
            type: "string"
          imageId:
            $ref: "#/components/schemas/UniqueId"
        required:
        - "imageId"
    ChoicesQuickReplies:
      description: "Choices with quick reply options"
      allOf:
      - $ref: "#/components/schemas/AbstractChoices"
      - type: "object"
        properties:
          images:
            type: "array"
            items:
              $ref: "#/components/schemas/ImageAsset"
          text:
            $ref: "#/components/schemas/Text"
          optionItems:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/TitleOptionItem"
        required:
        - "text"
        - "optionItems"
    CommandExperienceType:
      description: "A unidirectional Experience Type Command Message"
      allOf:
      - $ref: "#/components/schemas/AbstractCommand"
      - type: "object"
        properties:
          arguments:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/ExperienceTypeValue"
        required:
        - "arguments"
    SectionId:
      type: "string"
    FormFlow:
      description: "A form with dynamic wizard"
      allOf:
      - $ref: "#/components/schemas/AbstractForm"
      - type: "object"
        properties:
          name:
            type: "string"
            description: "The generated form name in Core. example : SF_Managed_UUID"
          assets:
            type: "array"
            items:
              $ref: "#/components/schemas/AbstractAsset"
          message:
            description: "Message bubble the user sees on their device"
            $ref: "#/components/schemas/MessagePrompt"
          sections:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/AbstractSection"
        required:
        - "name"
        - "sections"
    Link:
      description: "A web link."
      type: "object"
      properties:
        url:
          type: "string"
      required:
      - "url"
    AbstractEntry:
      description: "Base definition for all entry types"
      type: "object"
      properties:
        entryType:
          $ref: "#/components/schemas/EntryType"
        id:
          $ref: "#/components/schemas/EntryId"
      required:
      - "id"
      - "entryType"
      discriminator:
        propertyName: "entryType"
    PaymentItemStatus:
      description: "Status of a payment item"
      type: "string"
      enum:
      - "FinalCost"
      - "PendingCost"
      example: "Final"
    RoutingFailureType:
      type: "string"
      description: "How routing failed or succeeded"
      enum:
      - "None"
      - "Unknown"
      - "SubmissionError"
      - "RoutingError"
      - "Cancelled"
    InputSectionType:
      type: "string"
      enum:
      - "SingleInputSection"
    AuthenticationResponseMessage:
      description: "Authentication Response message"
      allOf:
      - $ref: "#/components/schemas/AbstractMessage"
      - type: "object"
        properties:
          authenticationResponse:
            $ref: "#/components/schemas/AbstractAuthenticationResponse"
        required:
        - "authenticationResponse"
    LinkCitedReference:
      description: "Link reference citation."
      allOf:
      - $ref: "#/components/schemas/AbstractCitedReference"
      - type: "object"
        properties:
          link:
            $ref: "#/components/schemas/Link"
          recordId:
            type: "string"
          label:
            type: "string"
        required:
        - "link"
    NamedValue:
      description: "A value with a unique name"
      additionalProperties: false
      type: "object"
      properties:
        name:
          type: "string"
        value:
          $ref: "#/components/schemas/AbstractValue"
      required:
      - "name"
      - "value"
    ErrorDetails:
      description: "Error Details"
      type: "object"
      properties:
        errorCode:
          type: "string"
        errorMessages:
          type: "array"
          minItems: 1
          items:
            type: "string"
      required:
      - "errorMessages"
      - "errorCode"
    PaymentLineItemValue:
      description: "A payment line item value"
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - type: "object"
        properties:
          lineItem:
            $ref: "#/components/schemas/AbstractPaymentLineItem"
        required:
        - "lineItem"
    AbstractCitedDetails:
      description: "Base definition for all cited detail types"
      type: "object"
      properties:
        citedDetailsType:
          $ref: "#/components/schemas/CitedDetailsType"
      required:
      - "citedDetailsType"
      discriminator:
        propertyName: "citedDetailsType"
        mapping:
          InlineMetadata: "#/components/schemas/InlineMetadataCitedDetails"
    OrderStatus:
      description: "Order status"
      type: "string"
      enum:
      - "Pending"
      - "Processing"
      - "PartiallyShipped"
      - "Shipped"
      - "Completed"
      - "Canceled"
      - "Failed"
      - "Refunded"
      - "Paid"
      - "Delivered"
      example: "Shipped"
    StructuredValue:
      description: "A value containing an arbitrary JSON object"
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - type: "object"
        properties:
          value:
            type: "object"
            description: "A value representing an object"
        required:
        - "value"
    FormResultType:
      type: "string"
      enum:
      - "FormRecordsResult"
      - "FormErrorResult"
    DateValue:
      description: "A date value as defined by rfc3339"
      allOf:
      - $ref: "#/components/schemas/AbstractValue"
      - type: "object"
        properties:
          dateValue:
            type: "string"
            format: "date"
        required:
        - "dateValue"
    ActionsContentSection:
      description: "A content section with actions"
      allOf:
      - $ref: "#/components/schemas/AbstractContentSection"
      - type: "object"
        properties:
          actions:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/AbstractAction"
        required:
        - "actions"
    OptionValue:
      description: "A value that presents an option of a choice or a form"
      additionalProperties: false
      type: "object"
      properties:
        value:
          $ref: "#/components/schemas/AbstractValue"
        optionIdentifier:
          $ref: "#/components/schemas/UniqueIdentifier"
      required:
      - "optionIdentifier"
      - "value"
    CalendarEventItemType:
      type: "string"
      description: "The type of a calendar event"
      enum:
      - "CalendarEventOptionsItem"
    TitleInteractionItemType:
      type: "string"
      enum:
      - "TitleLinkItem"
      - "TitleOptionItem"
    QueueRoutingConfigDetails:
      description: "Queue routing based configuration details."
      allOf:
      - $ref: "#/components/schemas/RoutingConfigurationDetails"
      - type: "object"
        properties:
          queueId:
            type: "string"
    AbstractCalendarEventItem:
      description: "The base type for calendar events"
      type: "object"
      properties:
        itemType:
          $ref: "#/components/schemas/CalendarEventItemType"
        location:
          $ref: "#/components/schemas/LocationItem"
        imageId:
          $ref: "#/components/schemas/UniqueId"
        title:
          type: "string"
        timezoneOffset:
          type: "integer"
        referenceId:
          $ref: "#/components/schemas/UniqueId"
      required:
      - "itemType"
      - "title"
      discriminator:
        propertyName: "itemType"
    AttachmentUploadResultType:
      type: "string"
      enum:
      - "CompletedAttachmentUploadResult"
      - "PendingAttachmentUploadResult"
      - "ErrorAttachmentUploadResult"
    AuthenticationRequestMessageDefinition:
      description: "References to a layout of authentication request"
      allOf:
      - $ref: "#/components/schemas/AbstractAuthenticationRequest"
      - type: "object"
        properties:
          parameters:
            type: "array"
            items:
              $ref: "#/components/schemas/NamedValue"
          messageDefinitionNameOrId:
            $ref: "#/components/schemas/MessageDefinitionNameOrId"
          targetLocale:
            $ref: "#/components/schemas/Locale"
            description: "The requested locale the message should be translated into"
            example: "en-US"
        required:
        - "messageDefinitionNameOrId"
    PaymentRequestPayment:
      description: "Payment request"
      allOf:
      - $ref: "#/components/schemas/AbstractPaymentRequest"
      - type: "object"
        properties:
          header:
            $ref: "#/components/schemas/AbstractTitleItem"
          images:
            type: "array"
            items:
              $ref: "#/components/schemas/ImageAsset"
          payment:
            $ref: "#/components/schemas/AbstractPaymentRequestDetails"
          message:
            $ref: "#/components/schemas/AbstractTitleItem"
          reply:
            $ref: "#/components/schemas/AbstractTitleItem"
          footer:
            $ref: "#/components/schemas/AbstractTitleItem"
        required:
        - "payment"
    AbstractFormResult:
      type: "object"
      properties:
        resultType:
          $ref: "#/components/schemas/FormResultType"
      required:
      - "resultType"
      discriminator:
        propertyName: "resultType"
    ExternalTemplateCategory:
      type: "string"
      description: "The categories of external templates"
      enum:
      - "Utility"
      - "Marketing"
      - "Authentication"
    StaticContentExperienceType:
      description: "A uni-directional Experience Type Message"
      allOf:
      - $ref: "#/components/schemas/AbstractStaticContent"
      - type: "object"
        properties:
          message:
            type: "string"
          values:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/ExperienceTypeValue"
        required:
        - "values"
    FormError:
      type: "object"
      properties:
        errorMessage:
          type: "string"
          description: "A non localized message. Do not use for display in UI."
        errorCode:
          type: "string"
          description: "A Salesforce API Error code. Can be used for displaying a localized error in UI"
        errorType:
          description: "The type of error to be used for displaying a localized error message in UI"
          $ref: "#/components/schemas/FormErrorType"
      required:
      - "errorType"
      - "errorMessage"
    FormResponseMessage:
      description: "MO Form response message"
      allOf:
      - $ref: "#/components/schemas/AbstractMessage"
      - type: "object"
        properties:
          formResponse:
            $ref: "#/components/schemas/AbstractFormResponse"
        required:
        - "formResponse"
    DynamicReference:
      description: "Reference to a dynamic value from screen field, ie 'SCREEN_ONE.field_a'"
      type: "object"
      properties:
        screenId:
          type: "string"
          description: "Screen ID for cross-screen references"
        path:
          type: "string"
          description: "Field name within the screen"
      required:
      - "screenId"
      - "path"
    TitleItemWithInteractions:
      additionalProperties: false
      type: "object"
      properties:
        titleItem:
          $ref: "#/components/schemas/AbstractTitleItem"
        interactionItems:
          type: "array"
          minItems: 1
          items:
