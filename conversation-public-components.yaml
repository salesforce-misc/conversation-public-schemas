        errorCode:
          $ref: "#/components/schemas/PaymentErrorCode"
      required:
      - "errorMessage"
      - "errorCode"
    Locale:
      type: "string"
      description: "A locale as defined by IETF BCP 47"
      example: "en-US"
    OptionPickerInput:
      description: "A picker input to select an option"
      allOf:
      - $ref: "#/components/schemas/AbstractInput"
      - type: "object"
        properties:
          selectedOptionIndex:
            type: "integer"
          optionItems:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/TitleOptionItem"
        required:
        - "optionItems"
