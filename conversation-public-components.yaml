            type: "array"
            items:
              $ref: "#/components/schemas/NamedValue"
          messageDefinitionNameOrId:
            $ref: "#/components/schemas/MessageDefinitionNameOrId"
          targetLocale:
            $ref: "#/components/schemas/Locale"
