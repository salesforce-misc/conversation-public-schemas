      type: "object"
      description: "Estimated Wait Time value and whether the Estimated Wait Time is requested or not."
      properties:
        estimatedWaitTimeInSeconds:
          type: "integer"
          format: "int32"
        isEWTRequested:
          type: "boolean"
    FontStyle:
      type: "string"
      description: "Font style for text components."
      enum:
      - "Italic"
    ActionType:
      type: "string"
      description: "The type of an action"
      enum:
      - "PhoneCallAction"
      - "VoiceCallAction"
      - "LinkAction"
      - "CopyCodeAction"
      - "TextReplyAction"
    AbstractOAuthTokenRequest:
      type: "object"
      properties:
        requestType:
          $ref: "#/components/schemas/OAuthTokenRequestType"
      required:
      - "requestType"
      discriminator:
        propertyName: "requestType"
        mapping:
          OAuthDelegatedClientSecretTokenRequest: "#/components/schemas/OAuthDelegatedClientSecretTokenRequest"
