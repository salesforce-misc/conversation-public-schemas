      properties:
        keyType:
          $ref: "#/components/schemas/PaymentPixKeyType"
        key:
          type: "string"
          description: "Pix key value (per keyType)."
        code:
          type: "string"
          description: "EMVCo Pix 'Copia e Cola' string."
      required:
      - "code"
      - "keyType"
      - "key"
    FlagLower:
      description: "A flag Lower entry"
      allOf:
      - $ref: "#/components/schemas/AbstractEntry"
    RoutingConfigurationType:
      type: "string"
      description: "Enum for Routing Configuration Type"
      enum:
      - "QueueRoutingType"
      - "AgentRoutingType"
    AbstractExperienceTypeFormResponse:
      type: "object"
      properties:
        responseType:
          $ref: "#/components/schemas/ExperienceTypeFormResponseType"
      required:
      - "responseType"
      discriminator:
        propertyName: "responseType"
    ShippingMethodType:
      description: "The type of shipping method."
      type: "string"
      enum:
      - "PaymentRequestShippingMethod"
      example: "PaymentRequestShippingMethod"
    DisplayableOption:
      description: "An option that is displayable without data lookup"
      additionalProperties: false
      type: "object"
      properties:
        alias:
          type: "string"
        optionId:
          $ref: "#/components/schemas/UniqueId"
          deprecated: true
        title:
          type: "string"
        optionIdentifier:
          $ref: "#/components/schemas/UniqueIdentifier"
      required:
      - "optionIdentifier"
      - "title"
      - "alias"
    ChoicesMedia:
      description: "Media links with options"
      allOf:
      - $ref: "#/components/schemas/AbstractChoices"
      - type: "object"
        properties:
          mediaAsset:
            $ref: "#/components/schemas/AbstractAsset"
          optionItems:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/TitleOptionItem"
        required:
        - "mediaAsset"
        - "optionItems"
    AbstractApplication:
      description: "A link to an application."
      type: "object"
      properties:
        name:
          type: "string"
        identifier:
          type: "string"
        applicationType:
          $ref: "#/components/schemas/ApplicationType"
        arguments:
          type: "array"
          items:
            $ref: "#/components/schemas/NamedValue"
        developerId:
          type: "string"
          example: "Apple imessage team id"
      required:
      - "name"
      - "identifier"
      - "developerId"
      - "applicationType"
      discriminator:
        propertyName: "applicationType"
    InputId:
      type: "string"
      description: "An id that uniquely identifies an input in a form message"
    AbstractOAuthAuthorizationRequest:
      type: "object"
      properties:
        requestType:
          $ref: "#/components/schemas/OAuthAuthorizationRequestType"
        state:
          type: "string"
        scope:
          type: "string"
      required:
      - "requestType"
      discriminator:
        propertyName: "requestType"
        mapping:
          OAuthCodeDelegatedExchangeAuthorizationRequest: "#/components/schemas/OAuthCodeDelegatedExchangeAuthorizationRequest"
    TemplateSectionTypes:
      description: "Types of sections or defined areas on a template"
      type: "string"
      enum:
      - "HeaderTemplateSection"
      - "BodyTemplateSection"
      - "LinkTemplateSection"
      - "PromotionalOfferTemplateSection"
      - "OrderStatusTemplateSection"
      example: "HeaderTemplateSection"
    CompleteFormAction:
      description: "A complete action"
      allOf:
      - $ref: "#/components/schemas/AbstractFormAction"
    AbstractInput:
      description: "Common attributes for all input types"
      type: "object"
      properties:
        inputType:
          $ref: "#/components/schemas/InputType"
        id:
          $ref: "#/components/schemas/InputId"
        label:
          $ref: "#/components/schemas/AbstractTitleItem"
        hintText:
          type: "string"
        required:
          type: "boolean"
      required:
      - "inputType"
      - "id"
      discriminator:
        propertyName: "inputType"
    AbstractFormIntroScreen:
      description: "Common base for all form introduction screen types"
      type: "object"
      properties:
        screenType:
          $ref: "#/components/schemas/FormIntroScreenType"
      required:
      - "screenType"
      discriminator:
        propertyName: "screenType"
    ValueType:
      type: "string"
      description: "The type of a value"
      enum:
      - "TextValue"
      - "BooleanValue"
      - "IntegerValue"
      - "DoubleValue"
      - "UrlValue"
      - "DateValue"
      - "DateTimeValue"
      - "ReferenceValue"
      - "ImageReferenceValue"
      - "ListValue"
      - "CompositeValue"
      - "LocationValue"
      - "AssetReferenceValue"
      - "ExperienceTypeValue"
      - "StructuredValue"
      - "PaymentLineItemValue"
      - "ShippingMethodValue"
      - "CurrencyAmountValue"
      - "DiscountValue"
      - "OrderContextValue"
      - "PaymentInitiationValue"
    VideoAsset:
      description: "A video asset of a message."
      allOf:
      - $ref: "#/components/schemas/AbstractAsset"
    AbstractAttachmentUploadResult:
      description: "The result of an attachment upload."
      type: "object"
      properties:
        resultType:
          $ref: "#/components/schemas/AttachmentUploadResultType"
      required:
      - "resultType"
      discriminator:
        propertyName: "resultType"
        mapping:
          CompletedAttachmentUploadResult: "#/components/schemas/CompletedAttachmentUploadResult"
          ErrorAttachmentUploadResult: "#/components/schemas/ErrorAttachmentUploadResult"
          PendingAttachmentUploadResult: "#/components/schemas/PendingAttachmentUploadResult"
    ChoicesResponseSelections:
      description: "The selections to a choices message"
      allOf:
      - $ref: "#/components/schemas/AbstractChoicesResponse"
      - type: "object"
        properties:
          selectedOptions:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/SelectedOption"
        required:
        - "selectedOptions"
    FormatType:
      description: "The rendering format of a message. How it looks."
      type: "string"
      enum:
      - "Attachments"
      - "RichLink"
      - "Media"
      - "Buttons"
      - "Carousel"
      - "QuickReplies"
      - "ListPicker"
      - "Selections"
      - "Links"
      - "TimePicker"
      - "Application"
      - "Result"
      - "Inputs"
      - "WebView"
      - "Text"
      - "ExperienceType"
      - "Flow"
      - "MessageDefinition"
      - "References"
      - "DisplayableOptions"
      - "EncryptedOAuthToken"
      - "Payment"
      - "ExternalTemplate"
      - "ErrorMessage"
      - "CancelAction"
      - "ConfirmMessage"
      - "ExtendedText"
      example: "Attachments"
    PaymentRequestContactField:
      description: "Allowed contact fields for a payment request."
      type: "string"
      enum:
      - "Email"
      - "Name"
      - "Phone"
      - "PostalAddress"
      - "PhoneticName"
      example: "Email"
    LogicalCondition:
      allOf:
      - $ref: "#/components/schemas/AbstractConditionExpression"
      - description: "Logical combination of conditions"
        type: "object"
        properties:
          conditions:
            minItems: 2
            description: "list of operands that will be used with operator"
            type: "array"
            items:
              $ref: "#/components/schemas/AbstractConditionExpression"
          operator:
            description: "Logical operator to be applied"
            $ref: "#/components/schemas/LogicalOperator"
        required:
        - "operator"
        - "conditions"
    AssetType:
      type: "string"
      description: "The type of an asset"
      enum:
      - "ImageAsset"
      - "VideoAsset"
      - "DocumentAsset"
    ConversationEntry:
      type: "object"
      properties:
        senderDisplayName:
          type: "string"
        identifier:
          type: "string"
        entryType:
          $ref: "#/components/schemas/EntryType"
        entryPayload:
          type: "string"
        sender:
          $ref: "#/components/schemas/Participant"
        visibilityStrategy:
          $ref: "#/components/schemas/VisibilityStrategy"
        transcriptedTimestamp:
          type: "integer"
          format: "int64"
        relatedRecords:
          type: "array"
          items:
            type: "string"
        clientTimestamp:
          type: "integer"
          format: "int64"
        clientDuration:
          type: "integer"
          format: "int64"
      required:
      - "identifier"
      - "sender"
      - "clientTimestamp"
      - "clientDuration"
      - "transcriptedTimestamp"
      - "entryType"
      - "entryPayload"
    OrderStatusTemplateSection:
      description: "Order status section of the template"
      allOf:
      - $ref: "#/components/schemas/AbstractTemplateSection"
      - type: "object"
        properties:
          orderStatusUpdate:
            $ref: "#/components/schemas/OrderStatusUpdate"
        required:
        - "orderStatusUpdate"
    StaticTitle:
      description: "The title object that can be placed anywhere on a section"
      allOf:
      - $ref: "#/components/schemas/AbstractInput"
      - type: "object"
        properties:
          titleItem:
            $ref: "#/components/schemas/TitleItem"
    PaymentResponseMessage:
      description: "Payment Response message"
      allOf:
      - $ref: "#/components/schemas/AbstractMessage"
      - type: "object"
        properties:
          paymentResponse:
            $ref: "#/components/schemas/AbstractPaymentResponse"
          referenceId:
            $ref: "#/components/schemas/UniqueId"
            description: "Used to correlate the payment status with the actual payment message"
        required:
        - "paymentResponse"
    AbstractTimeSlotItem:
      description: "The base type of a time slot"
      type: "object"
      properties:
        duration:
          type: "integer"
          description: "The duration of the time slot in seconds."
          example: 3600
        itemType:
          $ref: "#/components/schemas/TimeSlotItemType"
        startTime:
          type: "string"
          format: "date-time"
          example: "2021-02-25T14:00:00Z"
        referenceId:
          $ref: "#/components/schemas/UniqueId"
      required:
      - "itemType"
      - "startTime"
      - "duration"
      discriminator:
        propertyName: "itemType"
    SessionContextType:
      type: "string"
      description: "The type of session context event"
      enum:
      - "SessionContextSet"
    TitleLinkItem:
      allOf:
      - $ref: "#/components/schemas/AbstractTitleInteractionItem"
      - type: "object"
        properties:
          url:
            $ref: "#/components/schemas/Url"
        required:
        - "url"
