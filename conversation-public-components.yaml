      description: "An input to pick a date"
      allOf:
      - $ref: "#/components/schemas/AbstractInput"
      - type: "object"
        properties:
          maximumDate:
            type: "string"
            format: "date"
          dateFormat:
            type: "string"
            example: "MM/DD/YYYY"
          minimumDate:
            type: "string"
            format: "date"
          startDate:
            type: "string"
            format: "date"
            example: "2021-02-25"
