asyncapi: "1.0.0"
info:
  title: "Conversation Entry Payload Schema"
  version: "0.0.2"
  description: "Conversation Entry Payload Schema for Salesforce Enhanced Channels"

components:
  schemas:
    AbstractAction:
      description: "The base type of an action"
      discriminator:
        propertyName: "actionType"
      properties:
        actionType:
          $ref: "#/components/schemas/ActionType"
        label:
          type: "string"
      required:
      - "actionType"
      - "label"
      type: "object"
    AbstractApplication:
      description: "A link to an application."
      discriminator:
        propertyName: "applicationType"
      properties:
        applicationType:
          $ref: "#/components/schemas/ApplicationType"
        arguments:
          items:
            $ref: "#/components/schemas/NamedValue"
          type: "array"
        developerId:
          example: "Apple imessage team id"
          type: "string"
        identifier:
          type: "string"
        name:
          type: "string"
      required:
      - "name"
      - "identifier"
      - "developerId"
      - "applicationType"
      type: "object"
    AbstractAsset:
      description: "The base type of an asset from which concrete asset types extends."
      discriminator:
        propertyName: "assetType"
      properties:
        assetHandle:
          description: "Optional external handle (token) of the asset"
          type: "string"
        assetType:
          $ref: "#/components/schemas/AssetType"
        assetUrl:
          $ref: "#/components/schemas/Url"
        description:
          type: "string"
        id:
          $ref: "#/components/schemas/UniqueId"
        mimeType:
          $ref: "#/components/schemas/MimeType"
        referenceId:
          $ref: "#/components/schemas/UniqueId"
      required:
      - "id"
      - "assetType"
      - "mimeType"
      - "assetUrl"
      type: "object"
    AbstractAttachmentUploadResult:
      description: "The result of an attachment upload."
      discriminator:
        mapping:
          CompletedAttachmentUploadResult: "#/components/schemas/CompletedAttachmentUploadResult"
          ErrorAttachmentUploadResult: "#/components/schemas/ErrorAttachmentUploadResult"
          PendingAttachmentUploadResult: "#/components/schemas/PendingAttachmentUploadResult"
        propertyName: "resultType"
      properties:
        resultType:
          $ref: "#/components/schemas/AttachmentUploadResultType"
      required:
      - "resultType"
      type: "object"
    AbstractAuthenticationRequest:
      discriminator:
        mapping:
          EncryptedOAuthToken: "#/components/schemas/AuthenticationRequestEncryptedOAuthToken"
          MessageDefinition: "#/components/schemas/AuthenticationRequestMessageDefinition"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractAuthenticationResponse:
      discriminator:
        mapping:
          EncryptedOAuthToken: "#/components/schemas/AuthenticationResponseEncryptedOAuthToken"
          Result: "#/components/schemas/AuthenticationResponseResult"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractCalendarEventItem:
      description: "The base type for calendar events"
      discriminator:
        propertyName: "itemType"
      properties:
        imageId:
          $ref: "#/components/schemas/UniqueId"
        itemType:
          $ref: "#/components/schemas/CalendarEventItemType"
        location:
          $ref: "#/components/schemas/LocationItem"
        referenceId:
          $ref: "#/components/schemas/UniqueId"
        timezoneOffset:
          type: "integer"
        title:
          type: "string"
      required:
      - "itemType"
      - "title"
      type: "object"
    AbstractCatalog:
      discriminator:
        mapping:
          Catalog: "#/components/schemas/Catalog"
          MessageDefinition: "#/components/schemas/CatalogMessageDefinition"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractChoices:
      discriminator:
        mapping:
          Buttons: "#/components/schemas/ChoicesButtons"
          Carousel: "#/components/schemas/ChoicesCarousel"
          ConfirmMessage: "#/components/schemas/ChoicesConfirmMessage"
          DisplayableOptions: "#/components/schemas/ChoicesDisplayableOptions"
          ExperienceType: "#/components/schemas/ChoicesExperienceType"
          ListPicker: "#/components/schemas/ChoicesListPicker"
          Media: "#/components/schemas/ChoicesMedia"
          MessageDefinition: "#/components/schemas/ChoicesMessageDefinition"
          QuickReplies: "#/components/schemas/ChoicesQuickReplies"
          TimePicker: "#/components/schemas/ChoicesTimePicker"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractChoicesResponse:
      discriminator:
        mapping:
          ExperienceType: "#/components/schemas/ChoicesResponseExperienceType"
          Selections: "#/components/schemas/ChoicesResponseSelections"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractCitedDetails:
      description: "Base definition for all cited detail types"
      discriminator:
        mapping:
          InlineMetadata: "#/components/schemas/InlineMetadataCitedDetails"
        propertyName: "citedDetailsType"
      properties:
        citedDetailsType:
          $ref: "#/components/schemas/CitedDetailsType"
      required:
      - "citedDetailsType"
      type: "object"
    AbstractCitedReference:
      description: "Base definition for all cited reference types"
      discriminator:
        mapping:
          Link: "#/components/schemas/LinkCitedReference"
        propertyName: "citedReferenceType"
      properties:
        citedReferenceType:
          $ref: "#/components/schemas/CitedReferenceType"
      required:
      - "citedReferenceType"
      type: "object"
    AbstractCommand:
      discriminator:
        mapping:
          ExperienceType: "#/components/schemas/CommandExperienceType"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractConditionExpression:
      description: "Expression for evaluating conditions. Always returning boolean"
      discriminator:
        mapping:
          ComparisonCondition: "#/components/schemas/ComparisonCondition"
          LogicalCondition: "#/components/schemas/LogicalCondition"
          NotCondition: "#/components/schemas/NotCondition"
        propertyName: "type"
      properties:
        type:
          $ref: "#/components/schemas/ConditionExpressionType"
      required:
      - "type"
      type: "object"
    AbstractContent:
      description: "The base type of a content"
      discriminator:
        propertyName: "contentType"
      properties:
        contentType:
          $ref: "#/components/schemas/ContentType"
      required:
      - "contentType"
      type: "object"
    AbstractContentSection:
      description: "The base type of a content section"
      discriminator:
        propertyName: "sectionType"
      properties:
        examples:
          $ref: "#/components/schemas/ContentSectionExamples"
          description: "Optional map of parameter index or name to example values for dynamic parameters in this section."
        sectionType:
          $ref: "#/components/schemas/ContentSectionType"
      required:
      - "sectionType"
      type: "object"
    AbstractElement:
      discriminator:
        mapping:
          FooterElement: "#/components/schemas/FooterElement"
          IfElement: "#/components/schemas/IfElement"
          ImageElement: "#/components/schemas/ImageElement"
          StaticTextElement: "#/components/schemas/StaticTextElement"
          SwitchElement: "#/components/schemas/SwitchElement"
        propertyName: "elementType"
      properties:
        elementType:
          $ref: "#/components/schemas/ElementType"
      required:
      - "elementType"
      type: "object"
    AbstractEntry:
      description: "Base definition for all entry types"
      discriminator:
        propertyName: "entryType"
      properties:
        entryType:
          $ref: "#/components/schemas/EntryType"
        id:
          $ref: "#/components/schemas/EntryId"
      required:
      - "id"
      - "entryType"
      type: "object"
    AbstractExperienceTypeChoicesResponse:
      discriminator:
        propertyName: "responseType"
      properties:
        responseType:
          $ref: "#/components/schemas/ExperienceTypeChoicesResponseType"
      required:
      - "responseType"
      type: "object"
    AbstractExperienceTypeFormResponse:
      discriminator:
        propertyName: "responseType"
      properties:
        responseType:
          $ref: "#/components/schemas/ExperienceTypeFormResponseType"
      required:
      - "responseType"
      type: "object"
    AbstractExperienceTypeInput:
      description: "Base type for all Experience Type inputs"
      discriminator:
        propertyName: "inputType"
      properties:
        inputIdentifier:
          $ref: "#/components/schemas/UniqueIdentifier"
        inputType:
          $ref: "#/components/schemas/ExperienceTypeInputType"
      required:
      - "inputType"
      - "inputIdentifier"
      type: "object"
    AbstractForm:
      discriminator:
        mapping:
          ExperienceType: "#/components/schemas/FormExperienceType"
          Flow: "#/components/schemas/FormFlow"
          Inputs: "#/components/schemas/FormInputs"
          ListPicker: "#/components/schemas/FormListPicker"
          MessageDefinition: "#/components/schemas/FormMessageDefinition"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractFormAction:
      description: "The base type of a form action"
      discriminator:
        propertyName: "actionType"
      properties:
        actionType:
          $ref: "#/components/schemas/FormActionType"
      required:
      - "actionType"
      type: "object"
    AbstractFormIntroScreen:
      description: "Common base for all form introduction screen types"
      discriminator:
        propertyName: "screenType"
      properties:
        screenType:
          $ref: "#/components/schemas/FormIntroScreenType"
      required:
      - "screenType"
      type: "object"
    AbstractFormResponse:
      discriminator:
        mapping:
          ExperienceType: "#/components/schemas/FormResponseExperienceType"
          Inputs: "#/components/schemas/FormResponseInputs"
          References: "#/components/schemas/FormResponseReferences"
          Result: "#/components/schemas/FormResponseResult"
          Selections: "#/components/schemas/FormResponseSelections"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractFormResult:
      discriminator:
        propertyName: "resultType"
      properties:
        resultType:
          $ref: "#/components/schemas/FormResultType"
      required:
      - "resultType"
      type: "object"
    AbstractInformationRequest:
      discriminator:
        mapping:
          InformationRequest: "#/components/schemas/InformationRequest"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractInformationRequestItem:
      discriminator:
        mapping:
          Product: "#/components/schemas/ProductInformationRequestItem"
        propertyName: "informationRequestItemType"
      properties:
        informationRequestItemType:
          $ref: "#/components/schemas/InformationRequestItemCategory"
      required:
      - "informationRequestItemType"
      type: "object"
    AbstractInput:
      description: "Common attributes for all input types"
      discriminator:
        propertyName: "inputType"
      properties:
        dynamicLabel:
          $ref: "#/components/schemas/DynamicReference"
        dynamicRequired:
          $ref: "#/components/schemas/AbstractConditionExpression"
          description: "Controls required state of this element. Supports static or dynamic values `screen_a.fld_id_enabled`"
        enabled:
          $ref: "#/components/schemas/BooleanCondition"
          description: "Controls enabled state of this element. Supports static or dynamic values `screen_a.fld_id_enabled`"
        errorMessage:
          $ref: "#/components/schemas/DynamicValue"
          description: "Error message for the input"
        hintText:
          type: "string"
        id:
          $ref: "#/components/schemas/InputId"
        initialValue:
          $ref: "#/components/schemas/DynamicValue"
          description: "Initial value for the input"
        inputType:
          $ref: "#/components/schemas/InputType"
        label:
          $ref: "#/components/schemas/AbstractTitleItem"
        required:
          type: "boolean"
      required:
      - "inputType"
      - "id"
      type: "object"
    AbstractInputSection:
      description: "Common attributes for all input section types"
      discriminator:
        propertyName: "sectionType"
      properties:
        sectionType:
          $ref: "#/components/schemas/InputSectionType"
      required:
      - "sectionType"
      type: "object"
    AbstractInputValue:
      discriminator:
        propertyName: "inputValueType"
      properties:
        inputId:
          $ref: "#/components/schemas/InputId"
        inputValueType:
          $ref: "#/components/schemas/InputValueType"
        inputlabel:
          $ref: "#/components/schemas/AbstractTitleItem"
      required:
      - "inputValueType"
      - "inputId"
      type: "object"
    AbstractLocationItem:
      description: "The base type for locations."
      discriminator:
        propertyName: "itemType"
      properties:
        itemType:
          $ref: "#/components/schemas/LocationItemType"
        latitude:
          example: 37.7725
          format: "double"
          type: "number"
        longitude:
          example: -122.4311
          format: "double"
          type: "number"
        name:
          type: "string"
        radius:
          description: "The radius of the location in meters."
          format: "double"
          type: "number"
        referenceId:
          $ref: "#/components/schemas/UniqueId"
      required:
      - "itemType"
      - "name"
      type: "object"
    AbstractMessage:
      description: "Base definition for all message types"
      discriminator:
        mapping:
          AuthenticationRequestMessage: "#/components/schemas/AuthenticationRequestMessage"
          AuthenticationResponseMessage: "#/components/schemas/AuthenticationResponseMessage"
          CatalogMessage: "#/components/schemas/CatalogMessage"
          ChoicesMessage: "#/components/schemas/ChoicesMessage"
          ChoicesResponseMessage: "#/components/schemas/ChoicesResponseMessage"
          CommandMessage: "#/components/schemas/CommandMessage"
          FormMessage: "#/components/schemas/FormMessage"
          FormResponseMessage: "#/components/schemas/FormResponseMessage"
          InformationRequestMessage: "#/components/schemas/InformationRequestMessage"
          OrderMessage: "#/components/schemas/OrderMessage"
          PaymentRequestMessage: "#/components/schemas/PaymentRequestMessage"
          PaymentResponseMessage: "#/components/schemas/PaymentResponseMessage"
          PaymentStatusMessage: "#/components/schemas/PaymentStatusMessage"
          StaticContentMessage: "#/components/schemas/StaticContentMessage"
        propertyName: "messageType"
      properties:
        contentCategory:
          $ref: "#/components/schemas/MessageContentCategory"
          description: "The category of the message"
          example: "PromotionalOutreach"
        customHandlingType:
          $ref: "#/components/schemas/CustomHandlingType"
        id:
          $ref: "#/components/schemas/MessageId"
        inReplyToMessageId:
          $ref: "#/components/schemas/InReplyToMessageId"
        messageType:
          $ref: "#/components/schemas/MessageType"
        references:
          items:
            $ref: "#/components/schemas/RecordReference"
          type: "array"
      required:
      - "id"
      - "messageType"
      type: "object"
    AbstractOAuthAuthorizationRequest:
      discriminator:
        mapping:
          OAuthCodeDelegatedExchangeAuthorizationRequest: "#/components/schemas/OAuthCodeDelegatedExchangeAuthorizationRequest"
        propertyName: "requestType"
      properties:
        requestType:
          $ref: "#/components/schemas/OAuthAuthorizationRequestType"
        scope:
          type: "string"
        state:
          type: "string"
      required:
      - "requestType"
      type: "object"
    AbstractOAuthTokenRequest:
      discriminator:
        mapping:
          OAuthDelegatedClientSecretTokenRequest: "#/components/schemas/OAuthDelegatedClientSecretTokenRequest"
        propertyName: "requestType"
      properties:
        requestType:
          $ref: "#/components/schemas/OAuthTokenRequestType"
      required:
      - "requestType"
      type: "object"
    AbstractOrder:
      discriminator:
        mapping:
          Inputs: "#/components/schemas/OrderRequest"
          Result: "#/components/schemas/OrderResult"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractOrderResult:
      discriminator:
        mapping:
          OrderErrorResult: "#/components/schemas/OrderErrorResult"
          OrderRecordsResult: "#/components/schemas/OrderRecordsResult"
        propertyName: "resultType"
      properties:
        resultType:
          $ref: "#/components/schemas/OrderResultType"
      required:
      - "resultType"
      type: "object"
    AbstractPaymentLineItem:
      discriminator:
        mapping:
          PaymentRequestLineItem: "#/components/schemas/PaymentRequestLineItem"
        propertyName: "lineItemType"
      properties:
        lineItemType:
          $ref: "#/components/schemas/PaymentLineItemType"
      required:
      - "lineItemType"
      type: "object"
    AbstractPaymentRequest:
      discriminator:
        mapping:
          MessageDefinition: "#/components/schemas/PaymentRequestMessageDefinition"
          Payment: "#/components/schemas/PaymentRequestPayment"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractPaymentRequestDetails:
      discriminator:
        mapping:
          PaymentRequestDetails: "#/components/schemas/PaymentRequestDetails"
        propertyName: "paymentRequestDetailsType"
      properties:
        paymentRequestDetailsType:
          $ref: "#/components/schemas/PaymentRequestDetailsType"
      required:
      - "paymentRequestDetailsType"
      type: "object"
    AbstractPaymentResponse:
      discriminator:
        mapping:
          Result: "#/components/schemas/PaymentResult"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractPaymentStatusResponse:
      description: "Base definition for all payment status response types"
      discriminator:
        mapping:
          Inputs: "#/components/schemas/PaymentStatusResponse"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractSection:
      description: "Common attributes for all section(screen) types. This can include input and non input fields."
      discriminator:
        propertyName: "sectionType"
      properties:
        id:
          $ref: "#/components/schemas/SectionId"
          description: "The section Id."
        nextSectionId:
          $ref: "#/components/schemas/SectionId"
          description: "The next section to navigate to from the current section."
        sectionType:
          $ref: "#/components/schemas/SectionType"
        submitFlow:
          type: "boolean"
        title:
          description: "The title of each section."
          type: "string"
      required:
      - "sectionType"
      - "id"
      type: "object"
    AbstractSessionContext:
      description: "Base definition for all session context event"
      discriminator:
        propertyName: "contextType"
      properties:
        contextType:
          $ref: "#/components/schemas/SessionContextType"
      required:
      - "contextType"
      type: "object"
    AbstractShippingMethod:
      discriminator:
        mapping:
          PaymentRequestShippingMethod: "#/components/schemas/PaymentRequestShippingMethod"
        propertyName: "shippingMethodType"
      properties:
        shippingMethodType:
          $ref: "#/components/schemas/ShippingMethodType"
      required:
      - "shippingMethodType"
      type: "object"
    AbstractStaticContent:
      discriminator:
        mapping:
          Application: "#/components/schemas/StaticContentApplication"
          Attachments: "#/components/schemas/StaticContentAttachments"
          Buttons: "#/components/schemas/StaticContentButtons"
          CancelAction: "#/components/schemas/StaticContentCancelActionResponse"
          Carousel: "#/components/schemas/StaticContentCarousel"
          ErrorMessage: "#/components/schemas/StaticContentErrorMessage"
          ExperienceType: "#/components/schemas/StaticContentExperienceType"
          ExtendedText: "#/components/schemas/StaticContentExtendedText"
          ExternalTemplate: "#/components/schemas/StaticContentExternalTemplate"
          Links: "#/components/schemas/StaticContentLinks"
          Media: "#/components/schemas/StaticContentMedia"
          MessageDefinition: "#/components/schemas/StaticContentMessageDefinition"
          RichLink: "#/components/schemas/StaticContentRichLink"
          Text: "#/components/schemas/StaticContentText"
          WebView: "#/components/schemas/StaticContentWebView"
        propertyName: "formatType"
      properties:
        formatType:
          $ref: "#/components/schemas/FormatType"
      required:
      - "formatType"
      type: "object"
    AbstractTemplateSection:
      description: "Sections or defined areas in a template"
      discriminator:
        propertyName: "templateSectionType"
      properties:
        templateSectionType:
          $ref: "#/components/schemas/TemplateSectionTypes"
      type: "object"
    AbstractTimeSlotItem:
      description: "The base type of a time slot"
      discriminator:
        propertyName: "itemType"
      properties:
        duration:
          description: "The duration of the time slot in seconds."
          example: 3600
          type: "integer"
        itemType:
          $ref: "#/components/schemas/TimeSlotItemType"
        referenceId:
          $ref: "#/components/schemas/UniqueId"
        startTime:
          example: "2021-02-25T14:00:00Z"
          format: "date-time"
          type: "string"
      required:
      - "itemType"
      - "startTime"
      - "duration"
      type: "object"
    AbstractTiming:
      discriminator:
        mapping:
          DeferredTiming: "#/components/schemas/DeferredTiming"
          RecurringTiming: "#/components/schemas/RecurringTiming"
        propertyName: "timingType"
      properties:
        timingType:
          $ref: "#/components/schemas/TimingType"
      required:
      - "timingType"
      type: "object"
    AbstractTitleInteractionItem:
      discriminator:
        propertyName: "itemType"
      properties:
        itemType:
          $ref: "#/components/schemas/TitleInteractionItemType"
        titleItem:
          $ref: "#/components/schemas/AbstractTitleItem"
      required:
      - "itemType"
      - "titleItem"
      type: "object"
    AbstractTitleItem:
      discriminator:
        propertyName: "itemType"
      properties:
        itemType:
          $ref: "#/components/schemas/TitleItemType"
        referenceId:
          $ref: "#/components/schemas/UniqueId"
        secondarySubTitle:
          type: "string"
        subTitle:
          type: "string"
        tertiarySubTitle:
          type: "string"
        title:
          type: "string"
      required:
      - "itemType"
      - "title"
      type: "object"
    AbstractTransaction:
      description: "Base definition for all payment transactions"
      discriminator:
        mapping:
          PaymentGatewayTransaction: "#/components/schemas/PaymentGatewayTransaction"
        propertyName: "transactionType"
      properties:
        createdTimestamp:
          description: "Epoch time in milliseconds"
          format: "int64"
          type: "integer"
        error:
          $ref: "#/components/schemas/PaymentError"
          description: "Payment error details"
        orderId:
          description: "Order id of the transaction"
          type: "string"
        refunds:
          description: "List of refunds for this order."
          items:
            $ref: "#/components/schemas/Refund"
          type: "array"
        statusRaw:
          description: "Status of a payment transaction."
          example: "success"
          type: "string"
        transactionId:
          description: "Payment transaction ID."
          type: "string"
        transactionType:
          $ref: "#/components/schemas/PaymentStatusTransactionType"
        updatedTimestamp:
          description: "Epoch time in milliseconds"
          format: "int64"
          type: "integer"
      required:
      - "transactionType"
      - "transactionId"
      - "statusRaw"
      - "createdTimestamp"
      type: "object"
    AbstractValue:
      description: "The base type from which simple value types extends"
      discriminator:
        propertyName: "valueType"
      properties:
        valueType:
          $ref: "#/components/schemas/ValueType"
      required:
      - "valueType"
      type: "object"
    ActionInvocation:
      description: "Typed action plus free-form parameters for execution."
      properties:
        property:
          description: "Action property."
          type: "string"
        type:
          description: "Action identifier (e.g., 'copilotActionInput/EmployeeCopilot__SummarizeRecord')."
          type: "string"
        value:
          additionalProperties: true
          description: "Action parameters."
          type: "object"
      required:
      - "type"
      - "value"
      type: "object"
    ActionType:
      description: "The type of an action"
      enum:
      - "PhoneCallAction"
      - "VoiceCallAction"
      - "LinkAction"
      - "CopyCodeAction"
      - "TextReplyAction"
      - "FlowAction"
      type: "string"
    ActionsContentSection:
      allOf:
      - $ref: "#/components/schemas/AbstractContentSection"
      - properties:
          actions:
            items:
              $ref: "#/components/schemas/AbstractAction"
            minItems: 1
            type: "array"
        required:
        - "actions"
        type: "object"
      description: "A content section with actions"
    AgentRoutingConfigDetails:
      allOf:
      - $ref: "#/components/schemas/RoutingConfigurationDetails"
      - properties:
          agentId:
            type: "string"
        type: "object"
      description: "Agent routing based configuration details."
    AppType:
      description: "Enum listing unique identifiers for app services."
      enum:
      - "custom"
      - "agent"
      - "chatbot"
      - "conversation"
      - "live_message"
