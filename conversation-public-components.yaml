      properties:
        recordId:
          $ref: "#/components/schemas/RecordId"
        id:
          $ref: "#/components/schemas/UniqueId"
      required:
      - "id"
      - "recordId"
    ChoicesExperienceType:
      description: "An Experience Type Choices Message"
      allOf:
      - $ref: "#/components/schemas/AbstractChoices"
      - type: "object"
        properties:
          optionType:
            $ref: "#/components/schemas/ExperienceTypeRef"
          sourceType:
            $ref: "#/components/schemas/ExperienceTypeRef"
          sourceProperty:
