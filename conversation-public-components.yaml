        nonInput:
          $ref: "#/components/schemas/AbstractElement"
        visible:
          description: "Controls visibility of this element. Supports static or dynamic values `screen_a.fld_id_visible` or even boolean expression: `screen_a.fld_a == \"a\"`"
          $ref: "#/components/schemas/DynamicBooleanCondition"
