        properties:
          identifier:
            $ref: "#/components/schemas/UniqueIdentifier"
          timeSlotOptionItems:
            type: "array"
            minItems: 1
            items:
              $ref: "#/components/schemas/TimeSlotOptionItem"
        required:
        - "identifier"
        - "timeSlotOptionItems"
